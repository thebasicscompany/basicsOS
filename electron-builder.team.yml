# Team edition: same app, different product name and appId so Client and Team can both be installed.
# Build with: pnpm build:mac:team  (or build:mac:both for both DMGs)
appId: com.basics-hub.team
productName: Basics Hub Team
publish:
  provider: github
  owner: thebasicscompany
  repo: basicsOS
directories:
  buildResources: build
icon: public/favicon.png
win:
  icon: public/favicon.png
  executableName: basics-hub-team
files:
  - '!**/node_modules/**'
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.json,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.app.json,tsconfig.electron.json}'
extraResources:
  - from: resources/key-monitor
    to: key-monitor
  - from: resources/key-monitor.swift
    to: key-monitor.swift
asarUnpack:
  - resources/**
nsis:
  artifactName: Basics-Hub-Team-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlementsInherit: build/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSCameraUsageDescription: Application requests access to the device's camera.
    NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
dmg:
  artifactName: Basics-Hub-Team-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: basics-hub
  category: Utility
appImage:
  artifactName: Basics-Hub-Team-${version}.${ext}
npmRebuild: false
